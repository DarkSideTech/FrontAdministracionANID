<section class="main-content mx-auto">
    <div class="section-body entidad-body">
        <div class="row clearfix justify-content-center">
            <div class="col-lg-8 col-md-8 col-sm-12 col-xs-8 body_a">
                <div class="card mx-auto asign_body" style="width: 100%">
                    <div class="p-10 table_asign">
                        <div class="brand-table">
                          <img src="assets/images/dst/anid/anid_rojo_azul.png" class="rounded mx-auto d-block" style="max-width: 110px" alt="logo"/>
                        </div>
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="row m-0" id="title_two">
                                    <div class="col-auto p-0">
                                        <div class="ngxTableHeader">
                                            <div class="table-title">
                                                <h2 class="titletwo"><strong>Inicia Sesión</strong></h2>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="row m-0 center_asign">
                                    <div class="col-auto p-0">
                                        <div class="ngxTableHeader">
                                            <div class="table-title">
                                                <p class="mb-0 login-p2 asign_login">
                                                    <small class="text-dark"> Hemos encontrado {{organizations().length}} entidades asociadas a tu Documento de Identificacion. Para ingresar al sitio elegir una de ellas: </small>
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-8 table_size">
                            @for (organization of organizations(); track organization.Codigo_Organizacion) {
                                <button
                                    class="btn btn-outline-primary mb-2 w-100"
                                    type="button"
                                    (click)="selectOrganization(organization.Codigo_Organizacion)"
                                    [disabled]="loadingCode() === organization.Codigo_Organizacion"
                                    >
                                    <span >{{ organization.Nombre_Organizacion || 'Organizacion sin nombre' }}</span>
                                </button>
                            }
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <button type="submit" class="btn anid-btn-primary" (click)="restart()">Volver al Login</button>
                    </div>                
                </div>
            </div>
        </div>
    </div>
</section>
