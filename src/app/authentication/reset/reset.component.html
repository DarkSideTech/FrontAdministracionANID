<main class="d-flex align-items-center min-vh-100 py-3 py-md-0">
  <div class="container">
    <div class="row">
      <div class="auth-card">
        <div class="col-12">
          <div class="card card-primary Login-card">
            <div class="card-header">
              <div class="row">
                <div class="col-md-12 brand-wrapper">
                  <img
                    src="assets/images/dst/anid/anid_rojo_azul.png"
                    class="rounded mx-auto d-block"
                    style="max-width: 150px"
                    alt="logo"
                  />
                </div>
                <div class="text-center col-md-12">
                  <h3 class="titulo2"><span class="logo-name">Restablecer Contraseña</span></h3>
                </div>
              </div>
            </div>
            <div class="card-body">
              <p>Ingrese su clave actual y luego cree una nueva para actualizar el acceso a su cuenta.</p>
              <form method="POST"class="form2">
                <div class="form-group">
                  <label for="email">Contraseña Anterior</label>
                  <input
                    id="email"
                    type="email"
                    class="form-control"
                    name="email"
                    tabindex="1"
                    required
                    autofocus
                  />
                </div>
                <div class="form-group">
                  <label for="password">Nueva Contraseña</label>
                  <input
                    id="password"
                    type="password"
                    class="form-control pwstrength"
                    data-indicator="pwindicator"
                    name="password"
                    tabindex="2"
                    required
                  />
                  <div id="pwindicator" class="pwindicator">
                    <div class="bar"></div>
                    <div class="label"></div>
                  </div>
                </div>
                <div class="form-group">
                  <label for="password-confirm">Confirmar Clave</label>
                  <input
                    id="password-confirm"
                    type="password"
                    class="form-control"
                    name="confirm-password"
                    tabindex="2"
                    required
                  />
                </div>
                <div class="text-center form-registro">
                  <button
                    type="submit"
                    class="btn anid-btn-primary btn-lg btn-block"
                    tabindex="4"
                  >
                    Cambiar Contraseña
                  </button>
                </div>
              </form>
              <div class="mt-3 text-center">
                <a class="text-enlace fw-bold"routerLink="/authentication/signin">Volver al Login</a>
              </div>
            </div>
          </div>
          <div class="row">
        <div class="text-center">
          <p>
            <a class="link-opacity-10" href="https://ayuda.anid.cl"
              >Departamento de Tecnologia y Procesos</a
            >
            </p>
          </div>
         </div>
        </div>
      </div>
    </div>
  </div>
</main>
