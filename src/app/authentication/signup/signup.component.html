<main class="d-flex align-items-center min-vh-100 py-3 py-md-0">
  <div class="container register-container">
    <div class="login-card card col-md-7">
      <div class="row no-gutters">
        <div class="col-md-12">
          <div class="register-body login-body">
            <div class="brand-wrapper col-md-12">
              <img
                src="assets/images/dst/anid/anid_rojo_azul.png"
                class="rounded mx-auto d-block"
                style="max-width: 150px"
                alt="logo"
              />
            </div>
            <div class="text-center col-md-12">
              <span class="titulo2">Crea Nuevo Usuario</span>
            </div>
            <form
              class="login-form mt-4"
              [formGroup]="registerForm"
              (ngSubmit)="onSubmit()"
            >
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label
                    >Tu correo
                    <span class="text-danger">*</span></label
                  >
                  <img src="assets/icon/email.svg" class="login-icons" alt="icono email"/>
                  <input
                    type="email"
                    class="form-control psl-5"
                    formControlName="email"
                    placeholder="Ejemplo@correo.cl"
                    required
                  />
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label>Nacionalidad <span class="text-danger">*</span></label>
                  <img src="assets/icon/pais.svg" class="login-icons" alt="icono nacionalidad"/>
                  <select
                    class="form-control form-select psl-5"
                    formControlName="nacionalidad"
                  >
                    <option selected disabled>Seleccione...</option>
                    <option value="1">Chilena</option>
                    <option value="2">Argentina</option>
                    <option value="3">Peruano</option>
                    <option value="4">Mexicano</option>
                  </select>
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label>Tipo de Usuario</label>
                  <img src="assets/icon/person_outline.svg" class="login-icons" alt="icono usuario"/>
                  <select
                    class="form-control form-select psl-5"
                    formControlName="tipoUsuario"
                  >
                    <option selected disabled>Seleccione...</option>
                    <option value="1">Extranjero</option>
                    <option value="2">Extranjero Residente</option>
                    <option value="3">Extranjero Nacionalizado</option>
                  </select>
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label>Documento de Identidad <span class="text-danger">*</span></label>

                  <input
                    type="text"
                    class="form-control"
                    formControlName="run"
                    placeholder="Pasaporte / Dni / Otro"
                    required
                  />
                </div>
              </div>
                <div class="col-md-12">
                  <div class="form-group position-relative">
                    <label
                      >Numero de Documento
                      <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      class="form-control"
                      formControlName="codigovalidadordocumento"
                      placeholder="Ej: xxx.xxx.xxx-x o xxxxxxxxx"
                      required
                    />
                  </div>
              </div>
                <div class="col-md-12">
                  <div class="form-group position-relative">
                    <label
                      >Código Validador Documento
                      <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      class="form-control"
                      formControlName="codigovalidadordocumento"
                      placeholder="Ej: xxxxxxxxx"
                      required
                    />
                  </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label
                    >Primer Nombre <span class="text-danger">*</span></label
                  >

                  <input
                    type="text"
                    class="form-control"
                    formControlName="primernombre"
                    placeholder="Ingrese su primer nombre"
                    required
                  />
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label>Segundo Nombre</label>

                  <input
                    type="text"
                    class="form-control"
                    formControlName="segundonombre"
                    placeholder="Ingrese su segundo nombre"
                  />
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label
                    >Primer Apellido <span class="text-danger">*</span></label
                  >

                  <input
                    type="text"
                    class="form-control"
                    formControlName="primerapellido"
                    placeholder="Ingrese su primer apellido"
                    required
                  />
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                  <label>Segundo Apellido</label>

                  <input
                    type="text"
                    class="form-control"
                    formControlName="segundoapellido"
                    placeholder="Ingrese su segundo apellido"
                  />
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-group position-relative">
                    <label>Sexo Declarativo<span class="text-danger">*</span></label>
                    <img src="assets/icon/sexo.svg" class="login-icons" alt="icono género"/>
                    <select class="form-control form-select psl-5" formControlName="sexo">
                      <option selected disabled>Seleccione...</option>
                      <option value="1">Mujer</option>
                      <option value="2">Hombre</option>
                      <option value="3">No Declara</option>
                    </select>
                  </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group position-relative">
                    <label>Sexo Registral<span class="text-danger">*</span></label>
                    <img src="assets/icon/sexo.svg" class="login-icons" alt="icono género"/>
                    <select class="form-control form-select psl-5" formControlName="sexo">
                      <option selected disabled>Seleccione...</option>
                      <option value="1">F-Femenino</option>
                      <option value="2">M-Masculino</option>
                      <option value="3">X-No Binario</option>
                      <option value="3">N-No Declara</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group position-relative">
                    <label
                      >Fecha de Nacimiento
                      <span class="text-danger">*</span></label
                    >

                    <input
                      type="date"
                      class="form-control custom-date"
                      formControlName="fechanacimiento"
                      placeholder="Fecha De Nacimiento"
                      required
                    />
                  </div>
                </div>

                <div class="col-md-12">
                  <div class="form-group position-relative">
                    <label>Contraseña <span class="text-danger">*</span></label>
                    <img src="assets/icon/https.svg" class="login-icons" alt="icono candado"/>
                    <input
                      type="password"
                      class="form-control psl-5"
                      formControlName="password"
                      placeholder="Contraseña"
                      required
                    />
                  </div>
                </div>
                <div class="col-md-12">
                  <div class="form-group position-relative">
                    <label
                      >Repetir Contraseña <span class="text-danger">*</span></label
                    >
                    <img src="assets/icon/https.svg" class="login-icons" alt="icono candado"/>
                    <input
                      type="password"
                      class="form-control psl-5"
                      formControlName="retypepassword"
                      placeholder="Repetir Contraseña"
                      required
                    />
                  </div>
                </div>
                <div class="col-md-12">
                  <div class="form-group">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="customCheck1"
                        formControlName="termcondition"
                      />
                      <label class="form-check-label" for="customCheck1">
                        Acepto
                        <a href="javascript:void(0)" class="text-enlace"
                          >Términos y condiciones</a
                        >
                      </label>
                    </div>
                  </div>
                </div>
                @if (error) {
                <div class="alert alert-danger mb-3 msl-3">{{ error }}</div>
                }
                <div class="col-md-12 text-center">
                  <button class="btn anid-btn-primary auth-form-btn btn_ext">
                    Registrarse
                  </button>
                </div>
                <div class="mx-auto text-center">
                  <p class="mb-0 mt-3">
                    <small class="text-dark msr-2"
                      >¿Ya tienes una cuenta?</small
                    >
                    <a
                      routerLink="/authentication/signin"
                      class="text-enlace fw-bold"
                      >Iniciar Sesion</a
                    >
                  </p>
                </div>
              </div>
            </form>
            <div class="mt-3 text-center">
              <a class="text-enlace"routerLink="/authentication/signin">Volver al Login</a>
            </div>
          </div>
        </div>
      </div>

    </div>
    <div class="row linkempresa">
        <div class="text-center">
          <p>
            <a class="link-opacity-10" href="https://ayuda.anid.cl">Departamento de Tecnologia y Procesos</a
            >
          </p>
        </div>
      </div>
  </div>
</main>
